name: Setup
description: Checkout, setup pnpm + Node.js, and install dependencies

runs:
    using: composite
    steps:
        - uses: pnpm/action-setup@v6
          with:
              version: 10.24.0

        - uses: actions/setup-node@v6
          with:
              node-version: 22
              cache: pnpm

        - run: pnpm install --frozen-lockfile
          shell: bash
