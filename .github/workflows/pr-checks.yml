name: PR Checks

on:
    pull_request:
        branches:
            - main

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
    NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
    NEXT_UPDATE_CONTENT_SECRET_KEY: 'sk-mock-test'

jobs:
    lint:
        name: Lint & Knip
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
            - run: pnpm lint
            - run: pnpm knip

    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
            - run: pnpm build
            - run: pnpm typecheck

    unit:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
            - run: pnpm test

    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
            - run: pnpm build
